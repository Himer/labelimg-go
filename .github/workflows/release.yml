name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GONOSUMDB: "git.sr.ht/*"
  GONOSUMCHECK: "git.sr.ht/*"
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: ""
            archive: tar.gz
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            suffix: ""
            archive: tar.gz
            cc: aarch64-linux-gnu-gcc
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: ""
            archive: tar.gz
          - os: macos-latest
            goos: darwin
            goarch: amd64
            suffix: ""
            archive: tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: ".exe"
            archive: zip
          - os: windows-latest
            goos: windows
            goarch: arm64
            suffix: ".exe"
            archive: zip

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      # Linux: install native dependencies
      - name: Install Linux dependencies (amd64)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Linux dependencies (arm64 cross-compile)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64

          # Remove default sources that don't support arm64
          sudo rm -f /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list

          CODENAME=$(lsb_release -cs)
          # amd64 packages from default archive
          sudo tee /etc/apt/sources.list.d/amd64.list <<AEOF
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu ${CODENAME} main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu ${CODENAME}-updates main restricted universe multiverse
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu ${CODENAME}-security main restricted universe multiverse
          AEOF

          # arm64 packages from ports
          sudo tee /etc/apt/sources.list.d/arm64.list <<BEOF
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME} main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME}-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ ${CODENAME}-security main restricted universe multiverse
          BEOF

          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          sudo apt-get install -y libgtk-3-dev:arm64 libwebkit2gtk-4.1-dev:arm64

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      # Build
      - name: Build (native)
        if: matrix.goos != 'linux' || matrix.goarch != 'arm64'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: wails build -platform ${{ matrix.goos }}/${{ matrix.goarch }} -tags webkit2_41

      - name: Build (linux arm64 cross-compile)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "1"
          CC: aarch64-linux-gnu-gcc
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
        run: wails build -platform linux/arm64 -tags webkit2_41

      # List build output for debugging
      - name: List build output
        shell: bash
        run: ls -lR build/bin/

      # Package
      - name: Package (macOS tar.gz)
        if: matrix.goos == 'darwin'
        shell: bash
        working-directory: build/bin
        run: |
          ARCHIVE="labelimg-go-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          if [ -d "labelimg-go.app" ]; then
            tar czf "${ARCHIVE}" "labelimg-go.app"
          else
            chmod +x labelimg-go 2>/dev/null || true
            tar czf "${ARCHIVE}" labelimg-go
          fi
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package (Linux tar.gz)
        if: matrix.goos == 'linux'
        shell: bash
        working-directory: build/bin
        run: |
          BINARY="labelimg-go"
          ARCHIVE="labelimg-go-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          chmod +x "${BINARY}" 2>/dev/null || true
          tar czf "${ARCHIVE}" "${BINARY}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        working-directory: build/bin
        run: |
          BINARY="labelimg-go${{ matrix.suffix }}"
          ARCHIVE="labelimg-go-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip"
          7z a "${ARCHIVE}" "${BINARY}" || zip "${ARCHIVE}" "${BINARY}"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: labelimg-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/labelimg-go-*
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
