<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LabelImg</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <button id="btn-open" title="Open Dir (Ctrl+U)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      <span>Open Dir</span>
    </button>
    <button id="btn-save" title="Save (Ctrl+S)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      <span>Save</span>
    </button>
    <button id="btn-load-classes" title="Load classes.txt">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span>Classes</span>
    </button>
    <div class="separator"></div>
    <button id="btn-prev" title="Prev Image (A)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      <span>Prev</span>
    </button>
    <button id="btn-next" title="Next Image (D)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span>Next</span>
    </button>
    <div class="separator"></div>
    <button id="btn-create" title="Create Box (W)" class="active">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Create</span>
    </button>
    <button id="btn-delete" title="Delete Box (Del)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      <span>Delete</span>
    </button>
    <div class="separator"></div>
    <button id="btn-undo" title="Undo (Ctrl+Z)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.42-8.49L1 10"/></svg>
      <span>Undo</span>
    </button>
    <button id="btn-redo" title="Redo (Ctrl+Y)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-5.42-8.49L23 10"/></svg>
      <span>Redo</span>
    </button>
    <div class="separator"></div>
    <button id="btn-zoomin" title="Zoom In (+)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      <span>Zoom+</span>
    </button>
    <button id="btn-zoomout" title="Zoom Out (-)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      <span>Zoom-</span>
    </button>
    <button id="btn-fit" title="Fit Window (F)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
      <span>Fit</span>
    </button>
    <div class="separator"></div>
    <select id="format-select" title="Annotation Format">
      <option value="PascalVOC">PascalVOC</option>
      <option value="YOLO" selected>YOLO</option>
      <option value="CreateML">CreateML</option>
    </select>
  </div>

  <!-- Main Layout -->
  <div id="main">
    <!-- Canvas Area -->
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
      <div id="status-bar">
        <span id="status-file">No image loaded</span>
        <span id="status-pos"></span>
        <span id="status-zoom">100%</span>
      </div>
    </div>

    <!-- Right Panel -->
    <div id="right-panel">
      <!-- Label Input -->
      <div class="panel-section">
        <div class="panel-header">Label</div>
        <div id="label-input-area">
          <input type="text" id="label-input" placeholder="Enter label..." list="label-suggestions" />
          <datalist id="label-suggestions"></datalist>
          <label id="default-label-toggle">
            <input type="checkbox" id="use-default-label" />
            <span>Use Default Label</span>
          </label>
        </div>
      </div>

      <!-- Labels List -->
      <div class="panel-section" id="labels-section">
        <div class="panel-header">Box Labels <span id="shape-count">(0)</span></div>
        <div id="labels-list"></div>
      </div>

      <!-- File List -->
      <div class="panel-section" id="files-section">
        <div class="panel-header">Files <span id="file-count">(0)</span></div>
        <div id="files-list"></div>
      </div>
    </div>
  </div>

  <!-- Label Dialog Modal -->
  <div id="label-dialog" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">Enter Label</div>
      <input type="text" id="dialog-label-input" list="dialog-label-suggestions" autofocus />
      <datalist id="dialog-label-suggestions"></datalist>
      <div class="modal-buttons">
        <button id="dialog-ok">OK</button>
        <button id="dialog-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="src/canvas.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
